<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCO</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/connexion.css">
</head>

<body>

    <div id="header-placeholder"></div> <!-- Le header sera chargé ici -->
    <script src="js/ScriptHeader.js"></script>

    <div class="container">
        <!-- Supprimer action et method -->
        <form id="signin-form">
            <label for="email">Email ou Nom d'utilisateur :</label>
            <input type="text" id="email" name="email" required>
            
            <label for="password">Mot de passe :</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit">Se connecter</button>
        </form>
        
        <p id="message"></p> <!-- Message de feedback -->

        <a href="mot_de_passe_oublie.html">Mot de passe oublié ?</a>
        <p>Pas encore de compte ? <a href="inscription.html">Créez-en un ici</a></p>
    </div>

    <div id="footer-placeholder"></div>
    <script src="js/ScriptFooter.js"></script>

    <!-- Script de connexion -->
    <script src="js/signin.js"></script>

</body>
</html>
